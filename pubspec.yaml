name: mindbreath
description: MindBreath iOS app
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

# launcher icons config
flutter_launcher_icons:
  ios: true
  android: false
  image_path_ios: assets/icon/MB-Icon.png
  remove_alpha_ios: true
